name: Check MK2 Seat Availability

on:
  schedule:
    # Runs at minute 0 of every hour (UTC)
    - cron: "0 * * * *"
  workflow_dispatch: {}  # allows manual trigger from the Actions tab

jobs:
  check-availability:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run availability check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python filter_session.py

      - name: Commit updated db
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sessions_db.json
          git diff --staged --quiet || git commit -m "Update seat availability db [skip ci]"
          git push
